<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack & The Temple of Shadows</title>
<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; }
.screen { display:none; padding:20px; text-align:center; }
.active { display:block; }
button { padding:15px 30px; font-size:20px; cursor:pointer; }
.chest { display:inline-block; padding:20px; margin:10px; background:#4E2E06; cursor:pointer; }
</style>
</head>
<body>

<div id="title-screen" class="screen active">
  <h1>JACK & THE TEMPLE OF SHADOWS</h1>
  <button onclick="startGame()">START ADVENTURE</button>
</div>

<div id="game-screen" class="screen">
  <div id="sentence-text"></div>
  <div id="chests">
    <div class="chest" onclick="selectWord('at')">AT</div>
    <div class="chest" onclick="selectWord('in')">IN</div>
    <div class="chest" onclick="selectWord('on')">ON</div>
  </div>
</div>

<script>
let selectedWord = null;
function startGame() {
  document.getElementById('title-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  document.getElementById('sentence-text').innerHTML = "Jack wakes up ___ six o'clock.";
}
function selectWord(word) {
  selectedWord = word;
  alert("Selected: " + word);
}
</script>
</body>
</html>
