<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack & The Temple of Shadows</title>
<style>
    /* 1. Full Screen Layout */
    body { 
        background: #000; color: #FFD700; font-family: 'Nunito', sans-serif; 
        margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        height: 100vh; overflow: hidden;
    }

    /* 2. Full Context Sentence - Large and Wrapping */
    #sentence-area { 
        font-size: 2.8rem; /* Large font size */
        text-align: center; 
        max-width: 90%; /* Forces text to wrap to new lines if long */
        line-height: 1.8; 
        color: #fff; 
        margin-bottom: 80px;
    }
    .gap { 
        border-bottom: 5px dotted #FFD700; color: #FFD700; 
        min-width: 150px; display: inline-block; padding: 0 10px;
    }

    /* 3. New Pirate Chest Styling - Matches your uploaded photo */
    #chest-container { display: flex; gap: 50px; }
    .chest { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .lid { width: 100px; height: 35px; background: #6b4423; border: 4px solid #D4AF37; border-radius: 8px 8px 0 0; transform: perspective(100px) rotateX(-45deg); }
    .body { width: 90px; height: 70px; background: #8B4513; border: 4px solid #D4AF37; border-radius: 0 0 8px 8px; display: flex; align-items: center; justify-content: center; position: relative; }
    .body::before { content: '✨'; position: absolute; top: 10px; font-size: 1.5rem; }
    .label { font-family: 'Bangers'; font-size: 2.2rem; margin-top: 15px; color: #FFD700; }
</style>
</head>
<body>

    <div id="sentence-area">
        Jack arrives <span class="gap" id="active-gap" data-ans="on">...</span> Monday morning.
    </div>

    <div id="chest-container">
        <div class="chest" onclick="check('at')"><div class="lid"></div><div class="body"></div><div class="label">AT</div></div>
        <div class="chest" onclick="check('in')"><div class="lid"></div><div class="body"></div><div class="label">IN</div></div>
        <div class="chest" onclick="check('on')"><div class="lid"></div><div class="body"></div><div class="label">ON</div></div>
    </div>

    <script>
        function check(choice) {
            const gap = document.getElementById('active-gap');
            if (choice === gap.dataset.ans) {
                gap.textContent = choice.toUpperCase();
                gap.style.border = "none";
            } else {
                gap.style.borderColor = "red";
                setTimeout(() => { gap.style.borderColor = "#FFD700"; }, 800);
            }
        }
    </script>
</body>
</html>
