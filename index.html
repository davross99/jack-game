<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jack & The Temple of Shadows</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;position:fixed;}
body{font-family:'Nunito',sans-serif;user-select:none;-webkit-user-select:none;}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}

/* ══ TITLE ══ */
#title-screen{
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url('scene01.jpg') center/cover no-repeat;
  gap:0.8rem;padding:1.5rem;text-align:center;
}
.t-title{font-family:'Bangers',cursive;font-size:clamp(1.8rem,7vw,3rem);
  color:#FFD700;text-shadow:2px 2px 0 #5a3800;letter-spacing:2px;line-height:1.1;}
.t-sub{font-family:'Bangers',cursive;font-size:clamp(0.8rem,3vw,1.2rem);color:#90ee90;letter-spacing:3px;}
.t-pills{display:flex;gap:0.5rem;justify-content:center;}
.pill{background:rgba(255,215,0,0.15);border:2px solid #FFD700;border-radius:40px;
  padding:0.2rem 0.8rem;font-family:'Bangers',cursive;font-size:clamp(1rem,3.5vw,1.3rem);
  color:#FFD700;letter-spacing:2px;}
.t-hint{color:#ddd;font-size:clamp(0.75rem,2.5vw,0.9rem);max-width:280px;line-height:1.5;
  text-align:center;background:rgba(0,0,0,0.6);padding:0.4rem 0.7rem;border-radius:8px;}
.go-btn{background:linear-gradient(135deg,#FFD700,#FFA500);color:#1a1a00;
  font-family:'Bangers',cursive;font-size:clamp(1rem,3.5vw,1.5rem);letter-spacing:2px;
  border:none;padding:0.6rem 2rem;border-radius:40px;cursor:pointer;box-shadow:0 4px 0 #8B6914;}
.go-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #8B6914;}

/* ══ GAME SCREEN ══ */
#game-screen{justify-content:flex-start;background:#000;}

#bg{
  position:fixed;
