<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack & The Temple of Shadows</title>
    <style>
        body { background: #000; color: #FFD700; font-family: 'Nunito', sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Sentence Display */
        #story-container { font-size: 2.5rem; text-align: center; padding: 40px; line-height: 1.6; color: #fff; }
        .gap { border-bottom: 4px dotted #FFD700; color: #FFD700; min-width: 150px; display: inline-block; }

        /* Pirate Chest Design */
        #chest-row { display: flex; gap: 60px; margin-top: 50px; }
        .chest { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .lid { width: 80px; height: 30px; background: #6b4423; border: 3px solid #D4AF37; border-radius: 5px 5px 0 0; transform: perspective(100px) rotateX(-50deg); }
        .body { width: 70px; height: 50px; background: #8B4513; border: 3px solid #D4AF37; border-radius: 0 0 5px 5px; display: flex; align-items: center; justify-content: center; }
        .body::after { content: '💰'; font-size: 1.5rem; }
        .label { font-family: 'Bangers'; font-size: 1.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="story-container">
        Jack arrives <span class="gap" id="current-gap" data-ans="on">...</span> Monday morning.
    </div>

    <div id="chest-row">
        <div class="chest" onclick="check('at')"><div class="lid"></div><div class="body"></div><div class="label">AT</div></div>
        <div class="chest" onclick="check('in')"><div class="lid"></div><div class="body"></div><div class="label">IN</div></div>
        <div class="chest" onclick="check('on')"><div class="lid"></div><div class="body"></div><div class="label">ON</div></div>
    </div>

    <script>
        const gap = document.getElementById('current-gap');
        
        function check(choice) {
            if (choice === gap.dataset.ans) {
                gap.textContent = choice.toUpperCase();
                gap.style.borderBottom = "none";
            } else {
                gap.style.borderColor = "red";
                setTimeout(() => gap.style.borderColor = "#FFD700", 800);
            }
        }
    </script>
</body>
</html>
